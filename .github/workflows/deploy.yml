name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "design-qa.md"
      - "qa/**"

concurrency:
  group: short-link-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web application
        run: npm run build

      - name: Build Docker image
        run: |
          docker build --tag "short-link:${GITHUB_SHA}" .
          docker save "short-link:${GITHUB_SHA}" | gzip > short-link-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: short-link-image
          path: short-link-image.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Server
    needs: verify
    runs-on: ubuntu-latest
    env:
      REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
      PACKAGE_FILE: /tmp/short-link-deploy-${{ github.run_id }}.tar.gz
      ENV_FILE: /tmp/short-link-env-${{ github.run_id }}
      IMAGE_FILE: /tmp/short-link-image-${{ github.run_id }}.tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: short-link-image
          path: ${{ runner.temp }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Create deployment package
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='data' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='.npm-cache' \
            --exclude='qa' \
            --exclude='design-qa.md' \
            -czf "$RUNNER_TEMP/short-link-deploy-${GITHUB_RUN_ID}.tar.gz" .

      - name: Create production env file
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          if [ -z "$PRODUCTION_ENV_FILE" ]; then
            echo "PRODUCTION_ENV_FILE secret is empty." >&2
            exit 1
          fi

          printf '%s\n' "$PRODUCTION_ENV_FILE" \
            > "$RUNNER_TEMP/short-link-env-${GITHUB_RUN_ID}"
          chmod 600 "$RUNNER_TEMP/short-link-env-${GITHUB_RUN_ID}"

      - name: Upload package, image and env via SCP
        run: |
          scp \
            -P "$REMOTE_PORT" \
            -i ~/.ssh/id_ed25519 \
            "$RUNNER_TEMP/short-link-deploy-${GITHUB_RUN_ID}.tar.gz" \
            "$REMOTE_USER@$REMOTE_HOST:$PACKAGE_FILE"

          scp \
            -P "$REMOTE_PORT" \
            -i ~/.ssh/id_ed25519 \
            "$RUNNER_TEMP/short-link-env-${GITHUB_RUN_ID}" \
            "$REMOTE_USER@$REMOTE_HOST:$ENV_FILE"

          scp \
            -P "$REMOTE_PORT" \
            -i ~/.ssh/id_ed25519 \
            "$RUNNER_TEMP/short-link-image.tar.gz" \
            "$REMOTE_USER@$REMOTE_HOST:$IMAGE_FILE"

      - name: Deploy with Docker Compose
        run: |
          ssh \
            -p "$REMOTE_PORT" \
            -i ~/.ssh/id_ed25519 \
            "$REMOTE_USER@$REMOTE_HOST" \
            "PACKAGE_FILE='$PACKAGE_FILE' ENV_FILE='$ENV_FILE' IMAGE_FILE='$IMAGE_FILE' IMAGE_TAG='$GITHUB_SHA' DEPLOY_DIR='/app/short-link' bash -s" <<'REMOTE_SCRIPT'
            set -eu
            trap 'rm -f "$PACKAGE_FILE" "$ENV_FILE" "$IMAGE_FILE"' EXIT

            command -v docker >/dev/null
            docker compose version >/dev/null
            tar -tzf "$PACKAGE_FILE" >/dev/null
            test -s "$ENV_FILE"
            gzip -t "$IMAGE_FILE"

            mkdir -p "$DEPLOY_DIR" "$DEPLOY_DIR/data"

            find "$DEPLOY_DIR" \
              -mindepth 1 \
              -maxdepth 1 \
              ! -name '.env' \
              ! -name 'data' \
              -exec rm -rf {} +

            tar -xzf "$PACKAGE_FILE" -C "$DEPLOY_DIR"
            install -m 600 "$ENV_FILE" "$DEPLOY_DIR/.env"
            docker load --input "$IMAGE_FILE"

            app_uid="$(sed -n 's/^APP_UID=//p' "$DEPLOY_DIR/.env" | tail -n 1 | tr -d '\r')"
            app_gid="$(sed -n 's/^APP_GID=//p' "$DEPLOY_DIR/.env" | tail -n 1 | tr -d '\r')"
            app_uid="${app_uid:-1000}"
            app_gid="${app_gid:-1000}"

            case "$app_uid" in *[!0-9]*)
              echo "APP_UID must be numeric." >&2
              exit 1
            esac
            case "$app_gid" in *[!0-9]*)
              echo "APP_GID must be numeric." >&2
              exit 1
            esac

            docker run --rm \
              --user 0:0 \
              --volume "$DEPLOY_DIR/data:/app/short-link/data" \
              --entrypoint sh \
              "short-link:$IMAGE_TAG" \
              -c "chown -R '$app_uid:$app_gid' /app/short-link/data && chmod -R u+rwX /app/short-link/data"

            cd "$DEPLOY_DIR"
            IMAGE_TAG="$IMAGE_TAG" docker compose up -d --no-build --remove-orphans

            attempt=0
            while [ "$attempt" -lt 30 ]; do
              health_status="$(docker inspect \
                --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                short-link 2>/dev/null || true)"

              if [ "$health_status" = "healthy" ]; then
                break
              fi

              if [ "$health_status" = "unhealthy" ] || [ "$health_status" = "exited" ]; then
                docker compose logs --no-color short-link
                exit 1
              fi

              attempt=$((attempt + 1))
              sleep 2
            done

            if [ "$health_status" != "healthy" ]; then
              docker compose logs --no-color short-link
              echo "Container did not become healthy in time." >&2
              exit 1
            fi

            docker image prune -f
          REMOTE_SCRIPT
